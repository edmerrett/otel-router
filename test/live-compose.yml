# Live-test topology: the router plus two inspectable local stand-ins for your
# real destinations, and NO synthetic generators. The telemetry comes from
# Claude Cowork via the public tunnel. Used by test/cowork-live-test.sh.
#
#   sink-backend  native OTLP receiver (all signals) -> stands in for a backend
#   sink-webhook  HTTP echo (logs only, JSON)        -> stands in for a webhook feed
#
# INBOUND_TOKEN is supplied by the calling script via the environment.

services:
  router:
    build:
      context: ..
    environment:
      INBOUND_TOKEN: ${INBOUND_TOKEN}
      BACKEND_ENDPOINT: http://sink-backend:4318
      BACKEND_AUTH: Bearer live-backend-token
      WEBHOOK_ENDPOINT: http://sink-webhook:8080/v1/ingest
      WEBHOOK_API_KEY: live-api-key
      WEBHOOK_SECRET: live-secret
    ports:
      - "4318:4318"
    depends_on:
      - sink-webhook
      - sink-backend

  # Prints every request (method, path, headers, body) to stdout.
  sink-webhook:
    image: mendhak/http-https-echo@sha256:f55000d9196bd3c853d384af7315f509d21ffb85de315c26e9874033b9f83e15

  # Real OTLP collector; prints received telemetry in detail.
  sink-backend:
    image: otel/opentelemetry-collector@sha256:0beba82d63792511591522a8d582904b9a8ae81710357bfcab731607b8b0ffe2
    command: ["--config=/etc/otelcol/sink.yaml"]
    volumes:
      - ./sink.yaml:/etc/otelcol/sink.yaml:ro
