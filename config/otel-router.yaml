# Otel-router: receive OTLP once, fan out to two destinations.
#
# Point your services at this container (gRPC :4317 or HTTP :4318). Senders
# must present "Authorization: Bearer $INBOUND_TOKEN".
#
# The two destinations deliberately have different shapes:
#   siem  webhook-style HTTPS feed (e.g. Google SecOps): logs only, posted
#         as plain JSON to a fixed URL with an access-key header
#   app   native OTLP backend (e.g. an observability platform): all signals
#
# All endpoints and secrets come from environment variables at runtime:
#
#   INBOUND_TOKEN   bearer token senders must present to this router
#   SIEM_ENDPOINT   full webhook feed URL, e.g. https://siem.example.com/v1/ingest
#   SIEM_API_KEY    value for the X-goog-api-key header (Google SecOps feeds)
#   SIEM_SECRET     value for the X-Webhook-Access-Key header
#   APP_ENDPOINT    OTLP/HTTP base URL, e.g. https://o11y.example.com:4318
#   APP_AUTH        value for the Authorization header, e.g. "Bearer <token>"
#
# If a destination uses different auth header names, rename the keys under
# that exporter's `headers:` block.

extensions:
  # Rejects any inbound request without the expected bearer token.
  bearertokenauth/inbound:
    token: ${env:INBOUND_TOKEN}

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        auth:
          authenticator: bearertokenauth/inbound
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth/inbound

processors:
  # Batches telemetry before export; protects destinations from request storms.
  batch: {}

exporters:
  # Webhook-style: plain JSON to one fixed URL. Webhook feeds rarely accept
  # gzip, hence compression: none.
  otlphttp/siem:
    logs_endpoint: ${env:SIEM_ENDPOINT}
    encoding: json
    compression: none
    headers:
      X-goog-api-key: ${env:SIEM_API_KEY}
      X-Webhook-Access-Key: ${env:SIEM_SECRET}
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true

  # Native OTLP: standard /v1/{traces,metrics,logs} paths under one base URL.
  otlphttp/app:
    endpoint: ${env:APP_ENDPOINT}
    headers:
      Authorization: ${env:APP_AUTH}
    retry_on_failure:
      enabled: true
    sending_queue:
      enabled: true

service:
  extensions: [bearertokenauth/inbound]
  # Per-destination signal selection: a destination receives a signal only if
  # its exporter is listed in that signal's pipeline. The webhook feed takes
  # logs only; add otlphttp/siem to other pipelines if that ever changes.
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/app]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/app]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/siem, otlphttp/app]
