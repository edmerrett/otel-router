# TLS overlay: served alongside the base config when TLS_ENABLED=true.
#
# The collector merges every --config flag it receives (maps merge key by
# key), so this file adds only the `tls:` blocks; endpoints and auth come
# from base.yaml and destinations.yaml. entrypoint.sh appends this file as
# a second --config flag when TLS_ENABLED is set. Never pass it alone.
#
# TLS_CERT_FILE / TLS_KEY_FILE are container paths to a PEM certificate and
# key (mount them in). Both OTLP ports (4317 gRPC, 4318 HTTP) then require
# TLS; the health_check port (13133) deliberately stays plain HTTP for
# orchestrator liveness probes.

receivers:
  otlp:
    protocols:
      grpc:
        tls:
          cert_file: ${env:TLS_CERT_FILE}
          key_file: ${env:TLS_KEY_FILE}
      http:
        tls:
          cert_file: ${env:TLS_CERT_FILE}
          key_file: ${env:TLS_KEY_FILE}
