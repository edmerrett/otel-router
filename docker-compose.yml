# Demo harness: the router fans out to two differently-shaped destinations.
# sink-webhook is a plain HTTP echo server standing in for a webhook-style feed
# (logs only, JSON, access-key headers); sink-backend is a real OTLP collector
# standing in for an observability backend (all signals). Both are just example
# destinations defined in config/destinations.yaml. Run `docker compose up` and
# watch both receive data, while gen-noauth (no bearer token) is rejected. Run
# test/test.sh for a narrated, self-checking walkthrough of the same path.

services:
  router:
    build: .
    environment:
      INBOUND_TOKEN: demo-inbound-token
      BACKEND_ENDPOINT: http://sink-backend:4318
      BACKEND_AUTH: Bearer demo-backend-token
      WEBHOOK_ENDPOINT: http://sink-webhook:8080/v1/ingest
      WEBHOOK_API_KEY: demo-api-key
      WEBHOOK_SECRET: demo-webhook-secret
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - sink-webhook
      - sink-backend

  # Logs every request it receives (method, path, headers, body) to stdout.
  # Pinned by digest; tag: mendhak/http-https-echo:37
  sink-webhook:
    image: mendhak/http-https-echo@sha256:f55000d9196bd3c853d384af7315f509d21ffb85de315c26e9874033b9f83e15

  # Pinned by digest; tag: otel/opentelemetry-collector:0.156.0
  sink-backend:
    image: otel/opentelemetry-collector@sha256:0beba82d63792511591522a8d582904b9a8ae81710357bfcab731607b8b0ffe2
    command: ["--config=/etc/otelcol/sink.yaml"]
    volumes:
      - ./test/sink.yaml:/etc/otelcol/sink.yaml:ro

  gen-traces:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen@sha256:54c6f259070137716c741209b41d6b6742ace57fff0d8d754d88aaf310536834
    command: ["traces", "--otlp-endpoint", "router:4317", "--otlp-insecure",
              "--otlp-header", 'Authorization="Bearer demo-inbound-token"',
              "--duration", "5s"]
    depends_on:
      - router

  gen-metrics:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen@sha256:54c6f259070137716c741209b41d6b6742ace57fff0d8d754d88aaf310536834
    command: ["metrics", "--otlp-endpoint", "router:4317", "--otlp-insecure",
              "--otlp-header", 'Authorization="Bearer demo-inbound-token"',
              "--duration", "5s"]
    depends_on:
      - router

  gen-logs:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen@sha256:54c6f259070137716c741209b41d6b6742ace57fff0d8d754d88aaf310536834
    command: ["logs", "--otlp-endpoint", "router:4317", "--otlp-insecure",
              "--otlp-header", 'Authorization="Bearer demo-inbound-token"',
              "--duration", "5s"]
    depends_on:
      - router

  # Deliberately sends without a token; the router must reject it.
  gen-noauth:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen@sha256:54c6f259070137716c741209b41d6b6742ace57fff0d8d754d88aaf310536834
    command: ["traces", "--otlp-endpoint", "router:4317", "--otlp-insecure",
              "--duration", "2s"]
    depends_on:
      - router
