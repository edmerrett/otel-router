# Demo stand-in for a real destination: accepts OTLP and prints what arrives.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

# detailed so arriving span/metric/log content is visible and greppable
exporters:
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      exporters: [debug]
    logs:
      receivers: [otlp]
      exporters: [debug]
